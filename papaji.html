<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papaji (H.W.L. Poonja) Teachings</title>
    <meta name="description" content="Authentic quotes by Papaji (H.W.L. Poonja) on nonduality, self-inquiry, and awakening">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☸️</text></svg>">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            color: #f0f0f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen-Sans, Ubuntu, Cantarell, 'Helvetica Neue', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            text-align: center;
            transition: opacity 3s;
            opacity: 0;
        }
        .navigation {
            padding: 10px;
            background-color: rgba(0, 0, 0, 0.2);
        }
        .navigation a {
            color: #888;
            text-decoration: none;
            margin: 0 10px;
            font-size: 14px;
            transition: color 0.3s;
        }
        .navigation a:hover {
            color: #f0f0f0;
        }
        .container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }
        .quote-container {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.05);
            background-color: rgba(0, 0, 0, 0.3);
            padding: 2rem;
        }
        .quote {
            font-size: clamp(1rem, 2.5vw, 1.5rem);
            line-height: 1.6;
            margin-bottom: 1rem;
            transition: opacity 2s;
        }
        .author {
            font-size: clamp(0.8rem, 2vw, 1.2rem);
            opacity: 0.8;
            transition: opacity 2s;
        }
        @media (max-width: 600px) {
            .quote-container {
                padding: 1rem;
                margin: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="navigation">
        <a href="index.html">Tulku Urgyen Rinpoche</a>
        <a href="papaji.html">Papaji (H.W.L. Poonja)</a>
        <a href="abraham.html">Abraham Hicks</a>
        <a href="joe-dispenza.html">Dr. Joe Dispenza</a>
    </div>
    <div class="container">
        <div class="quote-container">
            <div id="quote" class="quote" aria-live="polite"></div>
            <div id="author" class="author"></div>
        </div>
    </div>
    <script>
        const quotes = [
            {
                text: "The greatest obstacle to enlightenment is the belief that you are not already enlightened. This belief keeps you searching outside yourself for something you already are. The truth is, you are always and already the Self. You are not separate from it, and you cannot become it because you already are it. All that's needed is to recognize this fact, to turn your attention inward and see for yourself.",
                author: "Papaji (H.W.L. Poonja)"
            },
            {
                text: "Silence is the true teaching. It is the perfect teaching. Words are only the vehicle of Silence. Silence is the best language. If you cannot keep quiet, at least speak about Silence. There is no effort in Silence. You don't have to do anything to be silent. In fact, the more you do, the further you get from Silence. Just stop doing, stop thinking, and you will find yourself in Silence.",
                author: "Papaji (H.W.L. Poonja)"
            },
            {
"text": "Fear is nothing but the mind's resistance to the present moment. It's a projection of the mind into the future, imagining all sorts of terrible things that might happen. But the future isn't here. All we have is this moment, and in this moment, there is nothing to fear. When you are fully present, anchored in the now, the illusion of fear dissolves. You realize that you are safe, that you are loved, and that you are eternally supported by the ever-present awareness that is your true Self.",
"author": "Papaji (H.W.L. Poonja)"
},
{
"text": "Your true teacher, your guru, isn't some external figure you have to go searching for. It resides within you, ever-present and unchanging. It is the Self, the pure awareness that underlies all experience. When you recognize this inner teacher, when you awaken to your own true nature, you are liberated. You are free from the limitations of the mind and emotions, and you experience a deep and abiding peace.",
"author": "Papaji (H.W.L. Poonja)"
},
{
"text": "Many people spend their lives chasing after something external – happiness, success, fulfillment. But Papaji reminds us that the purpose of life isn't to become something. It's to be what you already are. You are already complete, whole, and perfect. The journey is about uncovering this truth, about shedding the layers of illusion that obscure your true nature. It's about returning to the simplicity and innocence of your being.",
"author": "Papaji (H.W.L. Poonja)"
},
{
"text": "The mind is a powerful tool, but it can also be a source of suffering. It constantly churns out thoughts, worries, and judgments. Papaji teaches us not to believe everything our minds tell us. Thoughts are just thoughts, not the ultimate reality. The truth lies beyond the mind, in the stillness and silence of pure awareness. By learning to observe your thoughts without getting caught up in them, you can access a deeper level of peace and understanding.",
"author": "Papaji (H.W.L. Poonja)"
},
{
"text": "There's no need to fight with your mind or try to force it to be quiet. That only creates more resistance. Instead, Papaji suggests observing your mind with detached awareness. Watch your thoughts come and go like clouds in the sky. See how they arise, change, and dissolve. As you become a witness to your thoughts, you begin to identify with the Self, the unchanging essence beneath the mental chatter.",
"author": "Papaji (H.W.L. Poonja)"
},
{
"text": "The world around us isn't inherently good or bad. It's simply a reflection of our own consciousness. When our minds are filled with negativity, the world appears harsh and unforgiving. But when we cultivate love, compassion, and joy within ourselves, the world reflects those qualities back to us. By working on ourselves, by purifying our inner world, we contribute to the transformation of the outer world.",
"author": "Papaji (H.W.L. Poonja)"
},
{
"text": "True service isn't about doing things for others out of a sense of obligation. It's about expressing the love and compassion that are already overflowing within you. When you act from a place of inner peace and joy, your actions become a blessing to the world. You inspire others and contribute to a more harmonious and loving environment. Let your service be a natural overflow of your own awakened heart.",
"author": "Papaji (H.W.L. Poonja)"
},
{
"text": "Life can get bogged down with seriousness, with worries about the future and regrets about the past. Papaji reminds us not to take it all so seriously. Life is a precious gift, a beautiful play of consciousness. Lighten up, enjoy the ride, and find joy in the simple things. Savor the beauty of nature, the connection with loved ones, the wonder of being alive.",
"author": "Papaji (H.W.L. Poonja)"
},
            // ... (add the remaining 48 Papaji quotes here)
        ];

        function displayQuote() {
            const quoteElement = document.getElementById('quote');
            const authorElement = document.getElementById('author');
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            
            quoteElement.style.opacity = '0';
            authorElement.style.opacity = '0';
            
            setTimeout(() => {
                quoteElement.textContent = randomQuote.text;
                authorElement.textContent = `- ${randomQuote.author}`;
                quoteElement.style.opacity = '1';
                authorElement.style.opacity = '1';
            }, 2000);

            const delay = Math.max(20000, Math.min(30000, randomQuote.text.length * 75));
            setTimeout(displayQuote, delay);
        }

        window.addEventListener('load', () => {
            document.body.style.opacity = '1';
            displayQuote();
        });
    </script>
</body>
</html>
